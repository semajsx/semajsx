name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    # Run on manual dispatch, or when a release PR is merged
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish packages
        id: publish
        run: |
          TAGS_BEFORE=$(git tag --list)
          bunx changeset publish
          TAGS_AFTER=$(git tag --list)
          NEW_TAGS=$(comm -13 <(echo "$TAGS_BEFORE" | sort) <(echo "$TAGS_AFTER" | sort) | tr '\n' ' ')
          echo "new_tags=$NEW_TAGS" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Push tags
        if: steps.publish.outputs.new_tags != ''
        run: git push --tags

      - name: Create GitHub Release
        if: steps.publish.outputs.new_tags != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAGS: ${{ steps.publish.outputs.new_tags }}
        run: |
          # Only semajsx is published, so there's at most one tag (semajsx@x.y.z)
          TAG=$(echo "$NEW_TAGS" | tr ' ' '\n' | head -1)
          if [[ "$TAG" =~ ^semajsx@(.+)$ ]]; then
            VER="${BASH_REMATCH[1]}"
            gh release create "$TAG" \
              --title "v${VER}" \
              --generate-notes \
              --latest
          fi
