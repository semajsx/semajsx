name: Changeset Agent

# Flow:
# 1. On PR merge: Agent analyzes merged PR -> /tmp/changeset-result.json
# 2. If needed: create .changeset/auto-pr-{N}.md on a branch, merge via PR
# 3. On PR merge OR push with changeset changes: check for ANY pending changesets
# 4. If pending: create release/next from main, run changeset version
# 5. Force push release/next, create/update release PR
#
# Changeset files on main are the single source of truth.
# `changeset version` on the release branch consumes them;
# merging the release PR brings the deletions back to main.
# Changesets are merged via PR to respect branch protection rules.

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - ".changeset/*.md"
      - "!.changeset/README.md"

# Serialize runs - prevents races on main and release/next
concurrency:
  group: changeset-release
  cancel-in-progress: false

jobs:
  generate-changeset:
    # Only on PR merge (not push), skip release and changeset branch merges
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'release/') &&
      !startsWith(github.event.pull_request.head.ref, 'changeset/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "Changeset Bot"
          git config user.email "changeset-bot@users.noreply.github.com"

      - name: Analyze PR with Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          bunx agent-worker run github:lidessen/moniro#changeset -- \
            --guidelines "Single published package: only 'semajsx' is valid. All @semajsx/* packages are internal and bundled into 'semajsx' via subpath exports. During 0.x development: use 'minor' for breaking changes (not 'major') to keep versions in 0.x range."

      - name: Check result
        id: result
        run: |
          if [ ! -f /tmp/changeset-result.json ] || ! jq empty /tmp/changeset-result.json 2>/dev/null; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needed=$(jq -r '.needed // false' /tmp/changeset-result.json)" >> "$GITHUB_OUTPUT"

      - name: Validate changeset result
        if: steps.result.outputs.needed == 'true'
        id: validate
        run: |
          # Only "semajsx" is published — reject any other package name
          PACKAGES=$(jq -r '.packages | keys[]' /tmp/changeset-result.json)
          INVALID=$(echo "$PACKAGES" | grep -vxF 'semajsx' || true)

          if [ -n "$INVALID" ]; then
            echo "::error::Changeset references invalid packages: $INVALID (only 'semajsx' is published)"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Merge changeset to main via PR
        if: steps.result.outputs.needed == 'true' && steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHANGESET_ID="auto-pr-${PR_NUMBER}"
          BRANCH="changeset/${CHANGESET_ID}"
          DESC=$(jq -r '.description // "update"' /tmp/changeset-result.json)
          {
            echo "---"
            jq -r '.packages | to_entries[] | "\"\(.key)\": \(.value)"' /tmp/changeset-result.json
            echo "---"
            echo ""
            echo "$DESC"
          } > ".changeset/${CHANGESET_ID}.md"

          git checkout -b "$BRANCH"
          git add ".changeset/${CHANGESET_ID}.md"
          git commit -m "chore: add changeset for PR #${PR_NUMBER}"
          git push -u origin "$BRANCH"

          # Create and merge the changeset PR
          gh pr create \
            --title "chore: changeset for PR #${PR_NUMBER}" \
            --body "Auto-generated changeset for #${PR_NUMBER}." \
            --base main --head "$BRANCH"
          gh pr merge "$BRANCH" --squash --delete-branch

          # Return to updated main
          git checkout main
          git pull origin main

      - name: Summary
        run: |
          echo "### Changeset Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- PR: #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changeset needed: ${{ steps.result.outputs.needed }}" >> $GITHUB_STEP_SUMMARY

  version-release:
    # Run after generate-changeset (on PR merge) or independently (on push)
    # Skip when a release PR is merged (release.yml handles that)
    needs: [generate-changeset]
    if: >-
      always() &&
      !cancelled() &&
      (needs.generate-changeset.result == 'success' || needs.generate-changeset.result == 'skipped') &&
      !(github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'release/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "Changeset Bot"
          git config user.email "changeset-bot@users.noreply.github.com"

      - name: Version and create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect ALL pending changeset files (exclude README.md)
          PENDING=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' -print 2>/dev/null || true)
          if [ -z "$PENDING" ]; then
            echo "No pending changesets"
            exit 0
          fi

          PR_BODY="## Pending Changes"
          for f in $PENDING; do
            BASENAME=$(basename "$f" .md)
            # Extract description: everything after the closing "---" frontmatter
            DESC=$(awk '/^---$/{n++; next} n>=2' "$f" | sed '/^$/d' | head -1)
            [ -z "$DESC" ] && DESC="(no description)"
            if [[ "$BASENAME" == auto-pr-* ]]; then
              PR_NUM="${BASENAME#auto-pr-}"
              PR_BODY="${PR_BODY}"$'\n'"- #${PR_NUM}: ${DESC}"
            else
              PR_BODY="${PR_BODY}"$'\n'"- ${BASENAME}: ${DESC}"
            fi
          done
          PR_BODY="${PR_BODY}"$'\n\n'"---"$'\n'"Merge to publish packages to npm."

          # Fresh release branch from current main
          git branch -D release/next 2>/dev/null || true
          git checkout -b release/next

          bunx changeset version

          git add -A
          git commit -m "chore: version packages" || { echo "No version changes"; exit 0; }
          git push -f -u origin release/next

          # Wait for GitHub to index the new branch before creating PR
          echo "Waiting for GitHub to index the pushed branch..."
          for i in 1 2 3 4 5; do
            sleep 5
            REF_SHA=$(gh api "repos/${{ github.repository }}/git/ref/heads/release/next" --jq '.object.sha' 2>/dev/null || true)
            if [ -n "$REF_SHA" ]; then
              echo "Branch indexed (sha: $REF_SHA)"
              break
            fi
            echo "Attempt $i: branch not yet indexed, retrying..."
          done

          # Create or update PR
          EXISTING=$(gh pr list --head release/next --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$PR_BODY"
            echo "Updated release PR #${EXISTING}"
          else
            gh pr create --title "chore: release packages" --body "$PR_BODY" --base main --head release/next
            echo "Created release PR"
          fi
