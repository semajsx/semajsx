name: Changeset Release

# Flow:
# 1. PR merged → Agent analyzes PR, creates changeset
# 2. Push with changeset → version + publish + release

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - ".changeset/*.md"
      - "packages/semajsx/**"
  workflow_dispatch:

concurrency:
  group: changeset-release
  cancel-in-progress: false

jobs:
  generate-changeset:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Configure git
        run: |
          git config user.name "Changeset Bot"
          git config user.email "changeset-bot@users.noreply.github.com"

      - name: Analyze PR with Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          bunx agent-worker run .workflows/agent-changeset.yaml

      - name: Check and commit changeset
        run: |
          if [ -f /tmp/changeset-result.json ]; then
            NEEDED=$(jq -r '.needed // false' /tmp/changeset-result.json)
            if [ "$NEEDED" = "true" ]; then
              PR_NUM=${{ github.event.pull_request.number }}
              DESC=$(jq -r '.description // "update"' /tmp/changeset-result.json)
              PKG_VERSION=$(jq -r '.packages.semajsx // "patch"' /tmp/changeset-result.json)

              cat > ".changeset/auto-pr-${PR_NUM}.md" << EOF
              ---
              "semajsx": ${PKG_VERSION}
              ---

              ${DESC}
              EOF

              git add .changeset/
              git commit -m "chore: add changeset for PR #${PR_NUM}"
              git push origin main
            fi
          fi

  release:
    needs: generate-changeset
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version
        run: bun run version

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/semajsx
          npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN
          npm publish --access public --tag latest

      - name: Create Git tag
        run: |
          VERSION=$(node -p "require('./packages/semajsx/package.json').version")
          TAG="v${VERSION}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/semajsx/package.json').version")
          gh release create "v${VERSION}" \
            --title "semajsx v${VERSION}" \
            --generate-notes \
            --latest
