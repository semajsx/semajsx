agents:
  changeset_analyzer:
    model: deepseek:deepseek-chat
    system_prompt: |
      You are a changeset analyzer for the semajsx monorepo using changesets.
      You analyze merged PRs and determine which packages need version bumps.
      You produce structured JSON output — you do NOT create branches, PRs, or run git commands.

      **VALID PACKAGE NAMES (use ONLY these in the "packages" field):**
      - "@semajsx/core"
      - "@semajsx/signal"
      - "@semajsx/dom"
      - "@semajsx/terminal"
      - "@semajsx/ssr"
      - "@semajsx/ssg"
      - "@semajsx/style"
      - "@semajsx/tailwind"
      - "@semajsx/logger"
      - "@semajsx/utils"
      - "semajsx"

      NEVER use any package name not in this list. If the PR changes code
      that doesn't map to one of these packages, set "needed" to false.

      Version bump guidelines:
      - patch: bug fixes, documentation updates, internal refactors
      - minor: new features, new exports (backward compatible)
      - major: breaking changes, removed APIs, changed behavior

      **IMPORTANT - 0.x Development Phase:**
      - This project is in 0.x development (pre-1.0)
      - During 0.x: ALWAYS use "minor" for breaking changes (NOT "major")
      - This keeps versions in 0.x range (e.g., 0.4.0 -> 0.5.0, NOT 1.0.0)

      Look for keywords: "BREAKING", "breaking change", "feat:", "fix:", etc.

context:
  provider: memory

setup:
  - shell: echo "$PR_NUMBER"
    as: pr_number

  - shell: echo "$GITHUB_REPOSITORY"
    as: repo

  # Get PR information
  - shell: |
      gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
        --json title,body,author,labels,commits \
        --jq '{
          title: .title,
          body: .body,
          author: .author.login,
          labels: [.labels[].name],
          commits: [.commits[] | {message: .messageHeadline, body: .messageBody}]
        }'
    as: pr_info

  # Get changed files
  - shell: |
      gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
        --json files --jq '.files[].path'
    as: changed_files

  # Filter to only package changes (packages/* are the monorepo's publishable packages)
  - shell: |
      echo "$changed_files" | grep -E '^packages/' | head -50 || echo ""
    as: semajsx_changes

  # Check for existing changesets in the merged PR
  - shell: |
      CHANGESETS=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
        --json files --jq '[.files[] | select(.path | startswith(".changeset/")) | .path] | length')
      if [ "$CHANGESETS" -gt 0 ]; then
        echo "true"
      else
        echo "false"
      fi
    as: has_existing_changeset

kickoff: |
  @changeset_analyzer Analyze merged PR #${{ pr_number }} and determine if a changeset is needed for the semajsx package.

  ## Context

  **Has existing changeset in PR**: ${{ has_existing_changeset }}

  ## PR Information
  ```json
  ${{ pr_info }}
  ```

  ## Changed Files (ALL)
  ```
  ${{ changed_files }}
  ```

  ## semajsx Package Changes (packages/*)
  ```
  ${{ semajsx_changes }}
  ```

  ## Instructions

  1. If `has_existing_changeset` is `true`, the PR already included a changeset. Write:
     ```bash
     cat > /tmp/changeset-result.json << 'EOF'
     { "needed": false, "reason": "PR already contains a changeset" }
     EOF
     ```

  2. If `semajsx_changes` is empty (no changes under packages/), write:
     ```bash
     cat > /tmp/changeset-result.json << 'EOF'
     { "needed": false, "reason": "Changes don't affect semajsx package" }
     EOF
     ```

  3. Otherwise, analyze the semajsx changes:
     ```bash
     gh pr diff ${{ pr_number }} --repo ${{ repo }}
     ```

     Then write your analysis. Map changed directories to package names:
     - `packages/core/` → `"@semajsx/core"`
     - `packages/signal/` → `"@semajsx/signal"`
     - `packages/dom/` → `"@semajsx/dom"`
     - `packages/terminal/` → `"@semajsx/terminal"`
     - `packages/ssr/` → `"@semajsx/ssr"`
     - `packages/ssg/` → `"@semajsx/ssg"`
     - `packages/style/` → `"@semajsx/style"`
     - `packages/tailwind/` → `"@semajsx/tailwind"`
     - `packages/logger/` → `"@semajsx/logger"`
     - `packages/utils/` → `"@semajsx/utils"`
     - `packages/semajsx/` → `"semajsx"`

     ```bash
     cat > /tmp/changeset-result.json << 'EOF'
     {
       "needed": true,
       "packages": {
         "@semajsx/core": "patch|minor"
       },
       "description": "Brief description of the change for CHANGELOG"
     }
     EOF
     ```

  Rules:
  - Only generate changesets for changes in `packages/` directories
  - Use the EXACT package names listed above — never invent package names
  - Ignore docs/, .github/, scripts/, or other non-package changes
  - The `description` field should be a concise CHANGELOG entry (one line)
  - During 0.x, use "minor" for breaking changes (not "major")
  - The JSON must be valid — the CI will parse it to create the changeset
